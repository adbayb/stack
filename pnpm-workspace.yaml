packages:
    - "stack"
    - "stack/create"
allowBuilds:
    unrs-resolver: false
minimumReleaseAgeExclude:
    - "@adbayb/*"
    - termost
publicHoistPattern:
    - "*changesets*"
    - "*commitlint*"
    - "*eslint*"
    - "*prettier*"
    - "*turbo*"
    - "*typescript*"
    - "*types*"
verifyDepsBeforeRun: "warn"
