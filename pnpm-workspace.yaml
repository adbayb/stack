packages:
    - "stack"
    - "stack/create"
allowBuilds:
    unrs-resolver: false
minimumReleaseAgeExclude:
    - "@adbayb/*"
    - termost
publicHoistPattern:
    - "*changesets*"
    - "*commitlint*"
    - "*eslint*"
    - "*oxfmt*"
    - "*turbo*"
    - "*typescript*"
    - "*types*"
    # TODO: remove eslint, prettier and add oxlint/oxfmt?
saveExact: true
verifyDepsBeforeRun: "warn"
