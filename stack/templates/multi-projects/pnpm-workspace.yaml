allowBuilds:
    esbuild: true
    unrs-resolver: true
minimumReleaseAgeExclude:
    - "@adbayb/*"
packages:
    - "applications/*"
    - "examples/*"
    - "libraries/*"
    - "tools/*"
publicHoistPattern:
    - "*changesets*"
    - "*commitlint*"
    - "*eslint*"
    - "*prettier*"
    - "*turbo*"
    - "*typescript*"
    - "*types*"
verifyDepsBeforeRun: "warn"
